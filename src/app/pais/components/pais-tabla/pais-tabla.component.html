<div class="table-responsive">
  <table class="table table-hover">
    <thead>
      <tr>
        <th> # </th>
        <th> Flag </th>
        <th> Name / Capital </th>
        <th> Population </th>
        <th></th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let pais of paises; let i = index" class="animate__animated animate__fadeIn animate__faster">
        <td> {{ i + 1 }} </td>
        <td>
          <img class="small-flag" [src]="pais.flags.png" [alt]="pais.flags.alt || pais.name.common">
        </td>
        <td>
          <strong>{{ pais.name.common }}</strong>
          <br>
          <small class="text-muted">{{ pais.capital?.[0] || '—' }}</small>
        </td>
        <td> {{ pais.population | number }} </td>
        <td>
          <a [routerLink]="['/country', pais.cca2]" class="btn btn-sm btn-outline-primary">See more</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>
